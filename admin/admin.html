<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
</head>
<body>
    <h1>Admin Dashboard</h1>
    <form action="/update-settings" method="POST">
        <label for="site-title">Site Title:</label>
        <input type="text" id="site-title" name="site-title" required>
        <br>
        <label for="site-description">Site Description:</label>
        <textarea id="site-description" name="site-description" required></textarea>
        <br>
        <label for="site-email">Contact Email:</label>
        <input type="email" id="site-email" name="site-email" required>
        <br>
        <button type="submit">Save Settings</button>
    </form>
</body>
</html>
